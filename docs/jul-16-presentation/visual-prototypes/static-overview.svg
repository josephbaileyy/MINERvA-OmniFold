<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title{font:700 38px Inter,system-ui,sans-serif;fill:#17202a}.sub{font:500 18px Inter,system-ui,sans-serif;fill:#66717d}
      .h{font:700 22px Inter,system-ui,sans-serif;fill:#17202a}.small{font:600 14px Inter,system-ui,sans-serif;fill:#66717d}
      .tiny{font:650 12px Inter,system-ui,sans-serif;fill:#66717d}.line{stroke:#d8d5cd;stroke-width:2;fill:none}
    </style>
    <pattern id="grid" width="27" height="27" patternUnits="userSpaceOnUse"><path d="M27 0H0V27" fill="none" stroke="#4c78a8" stroke-opacity=".18"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#f28e2b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#17202a" flood-opacity=".08"/></filter>
  </defs>
  <rect width="1600" height="900" fill="#f5f3ee"/>
  <text x="65" y="70" class="title">Five visual studies</text>
  <text x="65" y="102" class="sub">Final frames from the interactive motion-sketch gallery</text>

  <!-- dimensionality -->
  <g transform="translate(65 145)" filter="url(#shadow)">
    <rect width="450" height="290" rx="18" fill="#fffdfa" stroke="#d8d5cd"/>
    <text x="24" y="38" class="h">1 · The dimensionality wall</text>
    <path d="M55 220V75H300" class="line"/>
    <g fill="#4c78a8">
      <circle cx="84" cy="185" r="6" opacity=".45"/><circle cx="110" cy="124" r="5" opacity=".7"/><circle cx="139" cy="164" r="7" opacity=".6"/>
      <circle cx="168" cy="100" r="5" opacity=".8"/><circle cx="196" cy="137" r="7" opacity=".46"/><circle cx="224" cy="89" r="6" opacity=".7"/>
      <circle cx="252" cy="155" r="5" opacity=".5"/><circle cx="274" cy="112" r="8" opacity=".72"/><circle cx="119" cy="202" r="5" opacity=".4"/>
      <circle cx="151" cy="191" r="6" opacity=".72"/><circle cx="206" cy="191" r="5" opacity=".58"/><circle cx="250" cy="208" r="6" opacity=".67"/>
    </g>
    <text x="337" y="115" class="small" text-anchor="middle">keep the</text><text x="337" y="137" class="small" text-anchor="middle">events</text>
    <text x="225" y="264" class="tiny" text-anchor="middle">the events were never the problem — the bins were</text>
  </g>

  <!-- OmniFold -->
  <g transform="translate(550 145)" filter="url(#shadow)">
    <rect width="985" height="290" rx="18" fill="#fffdfa" stroke="#d8d5cd"/>
    <text x="24" y="38" class="h">2 · One OmniFold iteration</text>
    <text x="42" y="77" class="tiny" fill="#7666c6">TRUTH SPACE</text><text x="42" y="184" class="tiny" fill="#4c78a8">RECO SPACE</text>
    <line x1="35" y1="156" x2="745" y2="156" class="line"/>
    <g stroke="#d8d5cd" stroke-width="1">
      <line x1="105" y1="101" x2="122" y2="220"/><line x1="170" y1="112" x2="155" y2="238"/><line x1="235" y1="91" x2="262" y2="214"/>
      <line x1="300" y1="119" x2="320" y2="231"/><line x1="365" y1="84" x2="348" y2="210"/><line x1="430" y1="106" x2="455" y2="242"/>
      <line x1="495" y1="96" x2="515" y2="218"/><line x1="560" y1="116" x2="544" y2="234"/><line x1="625" y1="87" x2="650" y2="214"/>
    </g>
    <g fill="#f28e2b" opacity=".88">
      <circle cx="105" cy="101" r="8"/><circle cx="170" cy="112" r="6"/><circle cx="235" cy="91" r="10"/><circle cx="300" cy="119" r="7"/>
      <circle cx="365" cy="84" r="9"/><circle cx="430" cy="106" r="6"/><circle cx="495" cy="96" r="10"/><circle cx="560" cy="116" r="7"/><circle cx="625" cy="87" r="9"/>
    </g>
    <g fill="#17202a" opacity=".85"><circle cx="103" cy="227" r="4"/><circle cx="153" cy="242" r="4"/><circle cx="212" cy="219" r="4"/><circle cx="268" cy="229" r="4"/><circle cx="321" cy="216" r="4"/><circle cx="380" cy="240" r="4"/><circle cx="444" cy="221" r="4"/><circle cx="508" cy="235" r="4"/><circle cx="576" cy="216" r="4"/><circle cx="650" cy="228" r="4"/></g>
    <path d="M746 222C813 222 813 95 746 95" fill="none" stroke="#7666c6" stroke-width="3" stroke-dasharray="7 7"/>
    <text x="807" y="165" class="small" text-anchor="middle">learn at reco</text><text x="807" y="188" class="small" text-anchor="middle">pull to truth</text>
    <path d="M820 205V104" stroke="#f28e2b" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="900" y="260" class="tiny" text-anchor="middle">weighted truth-level events</text>
  </g>

  <!-- bin at end -->
  <g transform="translate(65 470)" filter="url(#shadow)">
    <rect width="620" height="365" rx="18" fill="#fffdfa" stroke="#d8d5cd"/>
    <text x="24" y="40" class="h">3 · Choose projections at the end</text>
    <rect x="35" y="70" width="285" height="230" rx="12" fill="#f5f3ee" stroke="#d8d5cd"/>
    <g fill="#f28e2b" opacity=".72"><circle cx="70" cy="250" r="5"/><circle cx="96" cy="186" r="7"/><circle cx="118" cy="226" r="5"/><circle cx="145" cy="125" r="8"/><circle cx="171" cy="166" r="6"/><circle cx="194" cy="110" r="5"/><circle cx="219" cy="202" r="8"/><circle cx="247" cy="146" r="6"/><circle cx="278" cy="237" r="7"/><circle cx="111" cy="278" r="6"/><circle cx="177" cy="254" r="7"/><circle cx="260" cy="103" r="5"/></g>
    <g transform="translate(355 75)"><rect width="225" height="76" rx="9" fill="#fffdfa" stroke="#d8d5cd"/><g fill="#f28e2b" opacity=".75"><rect x="20" y="49" width="22" height="15"/><rect x="46" y="37" width="22" height="27"/><rect x="72" y="21" width="22" height="43"/><rect x="98" y="14" width="22" height="50"/><rect x="124" y="31" width="22" height="33"/><rect x="150" y="45" width="22" height="19"/></g></g>
    <g transform="translate(355 164)"><rect width="225" height="76" rx="9" fill="#fffdfa" stroke="#d8d5cd"/><g fill="#249689" opacity=".75"><rect x="20" y="43" width="30" height="21"/><rect x="54" y="28" width="30" height="36"/><rect x="88" y="11" width="30" height="53"/><rect x="122" y="26" width="30" height="38"/><rect x="156" y="48" width="30" height="16"/></g></g>
    <g transform="translate(355 253)"><rect width="225" height="76" rx="9" fill="#fffdfa" stroke="#d8d5cd"/><g fill="#7666c6" opacity=".75"><rect x="20" y="51" width="20" height="13"/><rect x="44" y="43" width="20" height="21"/><rect x="68" y="26" width="20" height="38"/><rect x="92" y="14" width="20" height="50"/><rect x="116" y="20" width="20" height="44"/><rect x="140" y="37" width="20" height="27"/><rect x="164" y="50" width="20" height="14"/></g></g>
    <text x="178" y="333" class="tiny" text-anchor="middle">one weighted sample</text><text x="468" y="350" class="tiny" text-anchor="middle">many justified views</text>
  </g>

  <!-- marginalization -->
  <g transform="translate(720 470)" filter="url(#shadow)">
    <rect width="390" height="365" rx="18" fill="#fffdfa" stroke="#d8d5cd"/>
    <text x="24" y="40" class="h">4 · Marginalize to validate</text>
    <path d="M65 286V103H284V286Z M65 103L112 75H331V258L284 286 M284 103L331 75" class="line"/>
    <g fill="#f28e2b" opacity=".72"><circle cx="105" cy="235" r="5"/><circle cx="130" cy="166" r="6"/><circle cx="165" cy="211" r="5"/><circle cx="190" cy="126" r="7"/><circle cx="226" cy="183" r="5"/><circle cx="255" cy="145" r="6"/><circle cx="275" cy="245" r="5"/></g>
    <g stroke="#249689" stroke-width="1" opacity=".6" stroke-dasharray="4 4"><line x1="65" y1="148" x2="284" y2="148"/><line x1="65" y1="194" x2="284" y2="194"/><line x1="65" y1="240" x2="284" y2="240"/><line x1="120" y1="103" x2="120" y2="286"/><line x1="175" y1="103" x2="175" y2="286"/><line x1="230" y1="103" x2="230" y2="286"/></g>
    <text x="195" y="326" class="tiny" text-anchor="middle">collapse the new axis → recover the anchor</text>
  </g>

  <!-- localize -->
  <g transform="translate(1145 470)" filter="url(#shadow)">
    <rect width="390" height="365" rx="18" fill="#fffdfa" stroke="#d8d5cd"/>
    <text x="24" y="40" class="h">5 · Localize the mismatch</text>
    <rect x="52" y="78" width="286" height="218" fill="#f5f3ee" stroke="#17202a" stroke-width="1.5"/>
    <g fill="#4c78a8"><path d="M52 78h71v54H52z" opacity=".05"/><path d="M123 78h71v54h-71z" opacity=".06"/><path d="M194 78h72v54h-72z" opacity=".15"/><path d="M266 78h72v54h-72z" opacity=".06"/></g>
    <g fill="#f28e2b"><path d="M194 132h72v55h-72z" opacity=".18"/><path d="M266 132h72v55h-72z" opacity=".34"/><path d="M266 187h72v54h-72z" opacity=".18"/></g>
    <rect x="266" y="78" width="72" height="54" fill="#c84b4b" opacity=".72"/><rect x="266" y="78" width="72" height="54" fill="none" stroke="#c84b4b" stroke-width="4"/>
    <text x="302" y="68" class="tiny" text-anchor="middle" fill="#c84b4b">a specific corner</text>
    <text x="195" y="326" class="tiny" text-anchor="middle">central value first · significance later</text>
  </g>
</svg>
