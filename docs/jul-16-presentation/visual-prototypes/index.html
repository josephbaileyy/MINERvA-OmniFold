<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MINERvA OmniFold — visual prototypes</title>
  <style>
    :root {
      --paper:#f5f3ee; --ink:#17202a; --muted:#66717d; --line:#d8d5cd;
      --sim:#4c78a8; --weight:#f28e2b; --truth:#7666c6; --valid:#249689;
      --alert:#c84b4b; --white:#fffdfa;
    }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--paper); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    header { display:grid; grid-template-columns:1fr auto; gap:24px; align-items:end; padding:26px 34px 18px; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 5px; font-size:clamp(22px,2.3vw,38px); letter-spacing:-.035em; font-weight:720; }
    header p { margin:0; color:var(--muted); font-size:14px; }
    .legend { display:flex; gap:16px; flex-wrap:wrap; justify-content:flex-end; font-size:12px; color:var(--muted); }
    .legend span { display:flex; align-items:center; gap:6px; }
    .swatch { width:10px; height:10px; border-radius:50%; display:inline-block; }
    nav { display:flex; gap:8px; padding:14px 34px; overflow-x:auto; border-bottom:1px solid var(--line); }
    nav button, .controls button { border:1px solid var(--line); color:var(--ink); background:var(--white); border-radius:999px; padding:9px 14px; font:inherit; font-size:13px; cursor:pointer; white-space:nowrap; }
    nav button.active { color:white; border-color:var(--ink); background:var(--ink); }
    main { width:min(1280px,calc(100vw - 40px)); margin:20px auto 34px; }
    .frame { position:relative; aspect-ratio:16/9; background:var(--white); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 18px 55px rgba(23,32,42,.08); }
    #scene { width:100%; height:100%; display:block; }
    .eyebrow { position:absolute; top:22px; left:27px; font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); font-weight:750; }
    .toy { position:absolute; top:22px; right:27px; font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); padding:5px 8px; border:1px solid var(--line); border-radius:999px; }
    .below { display:grid; grid-template-columns:1fr auto; gap:18px; align-items:center; padding-top:15px; }
    .below h2 { margin:0 0 4px; font-size:19px; letter-spacing:-.02em; }
    .below p { margin:0; color:var(--muted); font-size:13px; max-width:760px; }
    .controls { display:flex; align-items:center; gap:7px; }
    .controls button.primary { color:white; background:var(--ink); border-color:var(--ink); min-width:70px; }
    .counter { min-width:50px; text-align:center; font-size:12px; color:var(--muted); }
    svg text { font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    .fade { animation:fade .45s ease both; }
    @keyframes fade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    @media (max-width:760px) {
      header { grid-template-columns:1fr; padding:18px 20px 13px; }
      .legend { justify-content:flex-start; }
      nav { padding:10px 20px; }
      main { width:calc(100vw - 20px); margin-top:10px; }
      .below { grid-template-columns:1fr; }
      .controls { justify-content:center; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Visual language studies</h1>
      <p>Five motion sketches for a first-contact OmniFold talk</p>
    </div>
    <div class="legend">
      <span><i class="swatch" style="background:#17202a"></i>data</span>
      <span><i class="swatch" style="background:#4c78a8"></i>simulation</span>
      <span><i class="swatch" style="background:#f28e2b"></i>reweighted</span>
      <span><i class="swatch" style="background:#249689"></i>validation</span>
    </div>
  </header>
  <nav id="tabs"></nav>
  <main>
    <div class="frame">
      <div class="eyebrow" id="eyebrow"></div>
      <div class="toy">conceptual toy</div>
      <svg id="scene" viewBox="0 0 1200 675" role="img"></svg>
    </div>
    <div class="below">
      <div>
        <h2 id="title"></h2>
        <p id="note"></p>
      </div>
      <div class="controls">
        <button id="prev" aria-label="Previous step">←</button>
        <span class="counter" id="counter"></span>
        <button id="next" aria-label="Next step">→</button>
        <button class="primary" id="play">Play</button>
      </div>
    </div>
  </main>
  <script>
    const C={ink:'#17202a',muted:'#66717d',line:'#d8d5cd',sim:'#4c78a8',weight:'#f28e2b',truth:'#7666c6',valid:'#249689',alert:'#c84b4b',paper:'#f5f3ee',white:'#fffdfa'};
    const scenes=[
      {key:'wall', eyebrow:'The problem', title:'The dimensionality wall', note:'The event sample stays the same while a multidimensional binning divides it into increasingly sparse cells.', steps:4},
      {key:'iteration', eyebrow:'The method', title:'One OmniFold iteration', note:'Learn weights where the data live, then transfer them through the simulation’s reco–truth pairing.', steps:4},
      {key:'binning', eyebrow:'The payoff', title:'Choose projections at the end', note:'One weighted truth-level event sample supports many justified histograms and projections.', steps:4},
      {key:'marginal', eyebrow:'The cross-check', title:'Marginalization as validation', note:'Collapse the new axis and require the higher-dimensional result to return to the established anchor.', steps:3},
      {key:'localize', eyebrow:'The physics view', title:'A discrepancy becomes a location', note:'Opening a second coordinate can turn a broad projected mismatch into a specific kinematic region.', steps:3}
    ];
    let active=0, step=0, timer=null;
    const svg=document.querySelector('#scene');
    const E=(tag,attrs='',body='')=>`<${tag} ${attrs}>${body}</${tag}>`;
    const text=(x,y,s,size=22,fill=C.ink,weight=500,anchor='start')=>E('text',`x="${x}" y="${y}" font-size="${size}" fill="${fill}" font-weight="${weight}" text-anchor="${anchor}"`,s);
    const circle=(x,y,r,fill,opacity=1,stroke='none',sw=0)=>E('circle',`cx="${x}" cy="${y}" r="${r}" fill="${fill}" fill-opacity="${opacity}" stroke="${stroke}" stroke-width="${sw}"`);
    const line=(x1,y1,x2,y2,stroke=C.line,sw=2,dash='')=>E('line',`x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}" ${dash?`stroke-dasharray="${dash}"`:''}`);
    const rect=(x,y,w,h,fill='none',stroke=C.line,rx=0,sw=1,opacity=1)=>E('rect',`x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="${fill}" fill-opacity="${opacity}" stroke="${stroke}" stroke-width="${sw}"`);
    const path=(d,stroke,sw=3,fill='none',opacity=1,dash='')=>E('path',`d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" opacity="${opacity}" ${dash?`stroke-dasharray="${dash}"`:''}`);
    const grid=(x,y,n,cell,mode)=>{
      let g='';
      for(let j=0;j<n;j++) for(let i=0;i<n;i++){
        const d=Math.abs(i-j), base=Math.max(0,1-d/(n*.45));
        let op=mode==='dense'?.12+.75*base:((i*7+j*11)%13===0?.55:.035+.12*base);
        g+=rect(x+i*cell,y+j*cell,cell,cell,C.sim,C.white,0,.8,op);
      }
      return g+rect(x,y,n*cell,n*cell,'none',C.ink,2,2);
    };
    const toyPoints=Array.from({length:48},(_,i)=>({x:420+((i*83)%350),y:180+((i*47+(i%5)*19)%310),r:3+(i%4)*.8,w:.45+(i%5)*.18}));

    function wall(s){
      let out=text(600,92,'Same number of simulated events',24,C.muted,600,'middle');
      if(s===0){
        out+=text(600,152,'A useful response matrix',34,C.ink,700,'middle');
        out+=grid(430,195,7,48,'dense');
        out+=text(600,570,'cells are populated',20,C.sim,650,'middle');
      } else if(s===1){
        out+=text(600,152,'Add one more coordinate',34,C.ink,700,'middle');
        out+=grid(390,185,12,35,'sparse');
        out+=text(600,570,'more cells · fewer events per cell',20,C.sim,650,'middle');
      } else if(s===2){
        out+=text(600,152,'Again',34,C.ink,700,'middle');
        for(let k=4;k>=0;k--) out+=E('g',`transform="translate(${k*15},${-k*12})" opacity="${1-k*.13}"`,grid(405,205,10,32,'sparse'));
        out+=text(600,570,'most of the volume is sparse',20,C.alert,650,'middle');
      } else {
        out+=text(600,145,'Keep the events',34,C.ink,700,'middle');
        out+=path('M395 510 L395 185 L810 185',C.line,2);
        toyPoints.forEach((p,i)=>out+=circle(p.x,p.y,p.r,C.sim,.35+(i%4)*.15));
        out+=text(600,575,'The events were never the problem — the bins were.',25,C.ink,700,'middle');
      }
      return out;
    }

    const pairs=Array.from({length:14},(_,i)=>{
      const tx=195+i*58, ty=205+55*Math.sin(i*.83)+((i%3)-1)*18;
      const rx=tx+32*Math.sin(i*1.7), ry=445+48*Math.sin(i*.83+1.1)+((i%4)-1.5)*12;
      const wt=.6+((i*7)%9)/7;
      return {tx,ty,rx,ry,wt};
    });
    const dataPts=Array.from({length:19},(_,i)=>({x:180+i*42+24*Math.sin(i*1.4),y:458+38*Math.sin(i*.77+.4)}));
    function iteration(s){
      let out=text(155,158,'TRUTH SPACE',13,C.truth,750)+text(155,395,'RECO / DETECTOR SPACE',13,C.sim,750);
      out+=line(150,345,1050,345,C.line,2);
      pairs.forEach(p=>out+=line(p.tx,p.ty,p.rx,p.ry,C.line,1));
      dataPts.forEach(p=>out+=circle(p.x,p.y,4.2,C.ink,.88));
      if(s===0){
        pairs.forEach(p=>{out+=circle(p.tx,p.ty,5,C.sim,.45);out+=circle(p.rx,p.ry,6,C.sim,.75);});
        out+=text(600,592,'Start with paired simulated events and reconstructed data',23,C.ink,650,'middle');
      } else if(s===1){
        pairs.forEach(p=>{out+=circle(p.tx,p.ty,5,C.sim,.35);out+=circle(p.rx,p.ry,5+3*p.wt,C.weight,.88);});
        out+=E('path',`d="M780 505 C865 535 925 510 970 445" fill="none" stroke="${C.weight}" stroke-width="3" marker-end="url(#arrowO)"`);
        out+=text(830,555,'1 · learn reco-level weights',21,C.weight,720,'middle');
      } else if(s===2){
        pairs.forEach((p,i)=>{
          out+=circle(p.tx,p.ty,5,C.sim,.28)+circle(p.rx,p.ry,5+2*p.wt,C.weight,.48);
          const q=.48, x=p.rx+(p.tx-p.rx)*q, y=p.ry+(p.ty-p.ry)*q;
          out+=circle(x,y,4+2*p.wt,C.weight,.96,C.white,1);
        });
        out+=text(600,592,'2 · carry each weight through its reco–truth pairing',21,C.weight,720,'middle');
      } else {
        pairs.forEach(p=>{out+=circle(p.tx,p.ty,5+3*p.wt,C.weight,.88);out+=circle(p.rx,p.ry,5+2*p.wt,C.weight,.48);});
        out+=path('M930 245 C1015 245 1015 455 930 455',C.truth,3,'none',1,'7 8');
        out+=text(1005,350,'iterate',17,C.truth,700,'middle');
        out+=text(600,592,'The output is a weighted truth-level event sample',23,C.ink,700,'middle');
      }
      return `<defs><marker id="arrowO" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="${C.weight}"/></marker></defs>`+out;
    }

    function histogram(x,y,w,h,vals,color,label){
      let g=rect(x,y,w,h,C.white,C.line,12,1);
      const bw=(w-28)/vals.length, max=Math.max(...vals);
      vals.forEach((v,i)=>g+=rect(x+14+i*bw,y+h-18-(h-48)*v/max,bw-3,(h-48)*v/max,color,'none',3,0,0.78));
      g+=text(x+w/2,y+25,label,13,C.muted,700,'middle'); return g;
    }
    function binning(s){
      let out=text(440,130,'weighted truth events',19,C.weight,700,'middle');
      out+=rect(205,150,470,370,C.paper,C.line,14,1);
      toyPoints.slice(0,38).forEach((p,i)=>out+=circle(235+(p.x-420)*1.1,175+(p.y-180)*.95,3+p.w,C.weight,.55+(i%4)*.1));
      if(s===0){
        out+=text(865,320,'No final binning yet',29,C.ink,700,'middle');
        out+=text(865,356,'retain the event sample',18,C.muted,500,'middle');
      }
      if(s>=1) out+=histogram(760,125,350,135,[2,5,8,11,7,4],C.weight,'projection A');
      if(s>=2) out+=histogram(760,280,350,135,[4,8,12,7,3],C.valid,'different bin edges');
      if(s>=3){
        out+=histogram(760,435,350,135,[2,4,10,9,6,3,2],C.truth,'projection B');
        out+=text(440,578,'one weighted sample',21,C.ink,720,'middle');
        out+=text(935,606,'many justified views',21,C.ink,720,'middle');
      }
      return out;
    }

    const cubePts=Array.from({length:42},(_,i)=>({x:350+((i*67)%390),y:210+((i*41)%260),z:((i*29)%100)/100}));
    function marginal(s){
      let out=''; const squash=s===0?1:s===1?.45:0;
      out+=text(600,125,s===2?'Return to the established plane':'Add a physically motivated axis',31,C.ink,700,'middle');
      out+=path('M300 500 L300 190 L760 190 L760 500 Z',C.line,2);
      out+=path('M300 190 L390 140 L850 140 L760 190 M760 500 L850 450 L850 140',C.line,2);
      cubePts.forEach((p,i)=>{
        const dx=90*p.z*squash, dy=-50*p.z*squash;
        out+=circle(p.x+dx,p.y+dy,4.5,C.weight,.48+(i%4)*.1);
        if(s===1 && i%4===0) out+=line(p.x+dx,p.y+dy,p.x,p.y,C.valid,1,'4 5');
      });
      if(s===2){
        for(let x=300;x<=760;x+=92) out+=line(x,190,x,500,C.valid,.8,'4 5');
        for(let y=190;y<=500;y+=62) out+=line(300,y,760,y,C.valid,.8,'4 5');
        out+=circle(835,265,7,C.valid)+text(858,271,'lower-D anchor',17,C.valid,650);
        out+=text(600,585,'Every added dimension carries a marginal cross-check.',24,C.ink,700,'middle');
      } else {
        out+=text(870,255,'new coordinate',17,C.truth,700);
        out+=line(855,270,790,310,C.truth,2);
        out+=text(870,420,s===1?'sum along it':'keep event-level structure',17,C.muted,600);
      }
      return out;
    }

    function localize(s){
      let out=text(600,125,s===0?'A broad mismatch in projection':s===1?'Open a second coordinate':'The mismatch has a location',31,C.ink,700,'middle');
      if(s===0){
        out+=line(200,510,1010,510,C.ink,2)+line(200,510,200,190,C.ink,2);
        out+=path('M210 470 C330 430 410 300 520 315 S710 440 1000 260',C.sim,7);
        out+=path('M210 465 C330 420 410 290 520 300 S710 430 1000 185',C.ink,4);
        out+=path('M790 315 C860 320 920 265 1000 185 L1000 260 C920 330 855 370 790 350 Z','none',0,C.alert,.13);
        out+=text(890,220,'where?',20,C.alert,720,'middle');
      } else {
        out+=rect(285,170,620,385,C.paper,C.ink,2,2);
        for(let i=0;i<8;i++) for(let j=0;j<6;j++){
          const hot=(i>5&&j<2), warm=(i>4&&j<3);
          out+=rect(285+i*77.5,170+j*64.2,77.5,64.2,hot?C.alert:(warm?C.weight:C.sim),C.white,0,.7,hot?.7:(warm?.34:.07));
        }
        if(s===1){
          out+=text(990,335,'resolve',21,C.muted,700,'middle');
          out+=path('M940 345 L895 345',C.muted,2);
        } else {
          out+=rect(750,170,155,128,'none',C.alert,0,4);
          out+=text(827,147,'localized corner',18,C.alert,750,'middle');
          out+=text(600,595,'central-value observation · uncertainty conclusion in progress',18,C.muted,600,'middle');
        }
        out+=text(595,585,'observable 1',16,C.muted,600,'middle');
        out+=E('text','x="245" y="365" font-size="16" fill="'+C.muted+'" font-weight="600" text-anchor="middle" transform="rotate(-90 245 365)"','observable 2');
      }
      return out;
    }

    const renderers={wall,iteration,binning,marginal,localize};
    function render(){
      const sc=scenes[active];
      svg.innerHTML=E('g','class="fade"',renderers[sc.key](step));
      document.querySelector('#eyebrow').textContent=sc.eyebrow;
      document.querySelector('#title').textContent=sc.title;
      document.querySelector('#note').textContent=sc.note;
      document.querySelector('#counter').textContent=`${step+1} / ${sc.steps}`;
      document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',i===active));
      document.querySelector('#play').textContent=timer?'Pause':'Play';
    }
    function setScene(i){ active=i; step=0; stop(); render(); }
    function advance(n=1){ const sc=scenes[active]; step=(step+n+sc.steps)%sc.steps; render(); }
    function play(){ if(timer){stop();render();return;} timer=setInterval(()=>advance(1),1500); render(); }
    function stop(){ if(timer){clearInterval(timer);timer=null;} }
    const tabs=document.querySelector('#tabs');
    scenes.forEach((s,i)=>{const b=document.createElement('button');b.textContent=`${i+1} · ${s.title}`;b.onclick=()=>setScene(i);tabs.appendChild(b);});
    document.querySelector('#prev').onclick=()=>{stop();advance(-1)};
    document.querySelector('#next').onclick=()=>{stop();advance(1)};
    document.querySelector('#play').onclick=play;
    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowRight'){stop();advance(1)}
      if(e.key==='ArrowLeft'){stop();advance(-1)}
      if(e.key===' '){e.preventDefault();play()}
      if('12345'.includes(e.key))setScene(Number(e.key)-1);
    });
    render();
  </script>
</body>
</html>
